<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Sunu Paie Cloud</title>
<meta name="description" content="Gestion de la paie, simplement.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A3428">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --paper:#FAF6EE;
  --paper-dim:#F1EBDD;
  --ink:#1C2321;
  --ink-soft:#5B6660;
  --pine:#0E4A3B;
  --pine-dark:#0A3428;
  --gold:#B5883A;
  --gold-soft:#E9D9B6;
  --rule:#D8CFB8;
  --red:#A23B2E;
  --white:#FFFDF8;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
#paie-root{
  font-family:'Inter',sans-serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  display:flex;
  font-size:14px;
  line-height:1.45;
}
#paie-root h1,#paie-root h2,#paie-root h3{
  font-family:'Fraunces',serif;
  font-weight:600;
  color:var(--pine-dark);
  margin:0;
}
.mono{font-family:'IBM Plex Mono',monospace;}
.nav{
  width:216px;
  background:var(--pine-dark);
  color:var(--white);
  padding:22px 14px;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  gap:4px;
}
.nav-brand{
  font-family:'Fraunces',serif;
  font-size:16px;
  font-weight:700;
  color:var(--white);
  padding:0 10px 18px 10px;
  border-bottom:1px solid rgba(255,255,255,.15);
  margin-bottom:12px;
  line-height:1.3;
}
.nav-brand span{display:block;font-family:'Inter',sans-serif;font-weight:500;font-size:11px;color:var(--gold-soft);letter-spacing:.06em;text-transform:uppercase;margin-top:4px;}
.nav-btn{
  background:none;border:none;text-align:left;color:rgba(255,255,255,.78);
  padding:10px 12px;border-radius:7px;cursor:pointer;font-size:13.5px;font-weight:500;
  font-family:'Inter',sans-serif;display:flex;align-items:center;gap:9px;transition:background .12s;
}
.nav-btn:hover{background:rgba(255,255,255,.08);color:var(--white);}
.nav-btn.active{background:var(--gold);color:var(--pine-dark);font-weight:600;}
.nav-num{font-family:'IBM Plex Mono',monospace;font-size:10.5px;opacity:.6;width:16px;}
.nav-btn.active .nav-num{opacity:1;}
.nav-company-switch{
  width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:var(--white);
  padding:8px 9px;border-radius:6px;font-size:12.5px;font-family:'Inter',sans-serif;
}
.nav-company-switch option{color:var(--ink);}
.main{flex:1;padding:30px 38px;overflow-x:auto;max-width:1180px;}
.topbar{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
.topbar h1{font-size:24px;}
.subtitle{color:var(--ink-soft);font-size:13px;margin-top:3px;}
.card{
  background:var(--white);border:1px solid var(--rule);border-radius:10px;
  padding:20px 22px;margin-bottom:18px;
}
.card h3{font-size:14.5px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px;color:var(--pine);}
.grid{display:grid;gap:12px;}
.grid-2{grid-template-columns:1fr 1fr;}
.grid-3{grid-template-columns:1fr 1fr 1fr;}
.grid-4{grid-template-columns:1fr 1fr 1fr 1fr;}
label{display:block;font-size:11.5px;font-weight:600;color:var(--ink-soft);margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em;}
input,select{
  width:100%;padding:8px 10px;border:1px solid var(--rule);border-radius:6px;
  font-family:'Inter',sans-serif;font-size:13.5px;background:var(--paper);color:var(--ink);
}
input:focus,select:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:var(--gold);}
.field{margin-bottom:2px;}
.btn{
  background:var(--pine);color:var(--white);border:none;padding:9px 16px;border-radius:7px;
  font-weight:600;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;
}
.btn:hover{background:var(--pine-dark);}
.btn.secondary{background:transparent;color:var(--pine);border:1px solid var(--pine);}
.btn.secondary:hover{background:var(--paper-dim);}
.btn.danger{background:transparent;color:var(--red);border:1px solid var(--red);}
.btn.danger:hover{background:#fbeceb;}
.btn.gold{background:var(--gold);color:var(--pine-dark);}
.btn.gold:hover{filter:brightness(0.95);}
.btn-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--pine);font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--pine);}
td{padding:8px 10px;border-bottom:1px solid var(--rule);}
tr:hover td{background:var(--paper-dim);}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;background:var(--gold-soft);color:var(--pine-dark);}
.empty{padding:40px 20px;text-align:center;color:var(--ink-soft);}
.empty h3{color:var(--ink-soft);margin-bottom:6px;}
.modal-overlay{position:fixed;inset:0;background:rgba(20,25,22,.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
.modal{background:var(--white);border-radius:12px;padding:26px 28px;max-width:640px;width:100%;max-height:88vh;overflow-y:auto;}
.modal h2{font-size:19px;margin-bottom:16px;}
.close-x{position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink-soft);}
.select-row{display:flex;gap:10px;align-items:end;margin-bottom:16px;flex-wrap:wrap;}
.select-row .field{min-width:180px;flex:1;}

/* Bulletin / payslip ledger styling */
.bulletin{
  background:var(--white);border:1px solid var(--rule);border-radius:10px;overflow:hidden;
}
.bulletin.no-print-margin{margin-bottom:20px;}
.bulletin-head{background:var(--pine-dark);color:var(--white);padding:18px 24px;display:flex;justify-content:space-between;align-items:flex-start;}
.bulletin-head .ent{font-family:'Inter',sans-serif;font-weight:700;font-size:17px;}
.bulletin-head .adr{font-size:11.5px;color:var(--gold-soft);margin-top:2px;}
.bulletin-head .titre{text-align:right;font-family:'Inter',sans-serif;font-weight:600;font-size:12px;letter-spacing:.03em;color:var(--gold-soft);}
.bulletin-id{padding:14px 24px;border-bottom:1px solid var(--rule);display:grid;grid-template-columns:repeat(4,1fr);gap:10px 18px;background:var(--paper-dim);}
.bulletin-id div span{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);}
.bulletin-id div b{font-size:13px;}
.led-row{display:grid;grid-template-columns:36px 1fr 95px 60px 95px 95px 60px 105px;gap:0;padding:0;align-items:stretch;border-bottom:1px solid var(--rule);font-size:12.5px;}
.led-row>div{padding:4.5px 8px;border-left:1px solid rgba(28,35,33,.08);display:flex;align-items:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.led-row>div:first-child{border-left:none;padding-left:14px;padding-right:2px;}
.led-row>div:nth-child(2){padding-left:6px;}
.led-row>div:last-child{padding-right:20px;}
.led-row.head{background:var(--pine);color:var(--white);font-size:9.5px;text-transform:uppercase;letter-spacing:.03em;}
.led-row.head>div{border-left-color:rgba(255,255,255,.15);}
.led-row .code{font-family:'Inter',sans-serif;color:var(--ink-soft);font-size:9.5px;justify-content:center;text-align:center;}
.led-row.head .code{color:rgba(255,255,255,.6);}
.led-row .num{justify-content:flex-end;text-align:right;font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;white-space:nowrap;}
.led-row .num.taux{justify-content:center;text-align:center;}
.led-row.total{background:var(--gold-soft);font-weight:700;border-top:1.5px solid var(--gold);border-bottom:1.5px solid var(--gold);}
.led-row.net{background:var(--pine-dark);color:var(--white);font-weight:700;font-size:14px;}
.led-row.net>div{border-left-color:rgba(255,255,255,.25);}
.led-row.net .num{color:var(--white);}
.conges-box{margin:0 24px 14px;padding:12px 16px;background:var(--paper-dim);border-radius:8px;border:1px solid var(--rule);font-size:12px;}
.conges-box .ct{font-weight:700;color:var(--pine-dark);margin-bottom:6px;font-size:12.5px;}
.conges-box .cr{display:flex;justify-content:space-between;padding:2px 0;}
.conges-box .cr.tot{font-weight:700;border-top:1px solid var(--rule);margin-top:4px;padding-top:5px;color:var(--pine-dark);}
.bulletin-foot{padding:16px 24px;display:flex;justify-content:space-between;font-size:11.5px;color:var(--ink-soft);border-top:1px solid var(--rule);}
.section-lbl{padding:8px 24px 2px 24px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--gold);background:var(--paper-dim);}

.pill-toggle{display:flex;gap:6px;}
.pill-toggle button{flex:1;padding:8px;border-radius:6px;border:1px solid var(--rule);background:var(--paper);cursor:pointer;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;}
.pill-toggle button.on{background:var(--pine);color:var(--white);border-color:var(--pine);}

.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.kpi{background:var(--white);border:1px solid var(--rule);border-radius:10px;padding:16px 18px;}
.kpi .v{font-family:'Fraunces',serif;font-size:24px;font-weight:600;color:var(--pine-dark);}
.kpi .l{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;margin-top:2px;}

.recap-table td.num, .recap-table th.num{text-align:right;font-family:'IBM Plex Mono',monospace;}
.badge-warn{background:#FBEFE0;color:#8A5A16;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;}
.help{font-size:11.5px;color:var(--ink-soft);margin-top:10px;line-height:1.5;}
.divider{height:1px;background:var(--rule);margin:16px 0;}

@media print{
  *{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; color-adjust:exact !important; }
  @page{ size:A4; margin:8mm; }
  body *{visibility:hidden;}
  #print-area, #print-area *{visibility:visible;}
  #print-area{position:absolute;top:0;left:0;width:100%;}
  .no-print{display:none !important;}
  .bulletin{page-break-inside:avoid; border:1px solid #333; border-radius:0; font-size:13px; margin-bottom:0 !important;}
  .bulletin + .bulletin{page-break-before:always;}
  .bulletin-head{padding:14px 20px;}
  .bulletin-head .ent{font-size:16px;}
  .bulletin-head .adr{font-size:11px;}
  .bulletin-id{padding:10px 20px;grid-template-columns:repeat(4,1fr);gap:8px 16px;}
  .bulletin-id div span{font-size:9px;}
  .bulletin-id div b{font-size:12px;}
  .led-row{font-size:11.5px;border-bottom:1px solid #ccc;line-height:1.2;}
  .led-row>div{padding:3px 10px;border-left:1px solid #ddd;}
  .led-row>div:first-child{padding-left:14px;padding-right:4px;}
  .led-row>div:last-child{padding-right:14px;}
  .led-row.head{font-size:9.5px;}
  .led-row.net{font-size:13.5px;}
  .conges-box{margin:0 20px 10px;padding:9px 14px;font-size:11px;}
  .bulletin-foot{padding:8px 20px;font-size:10.5px;}
}
@media screen and (max-width:900px){
  #paie-root{flex-direction:column;}
  .nav{width:100%;flex-direction:row;overflow-x:auto;}
  .kpi-row{grid-template-columns:1fr 1fr;}
  .led-row{grid-template-columns:30px 1fr 55px 45px 70px 70px;font-size:11px;}
  .led-row div:nth-child(4),.led-row div:nth-child(7){display:none;}
}
</style>

<body>

<div id="paie-root"></div>
<script>
(function(){

const CFA = n => (Math.round((n||0)*100)/100).toLocaleString('fr-FR',{maximumFractionDigits:0}) + ' F';
const num = n => (n===null||n===undefined||isNaN(n)) ? 0 : n;
const MOIS_LABEL = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const uid = () => 'id' + Math.random().toString(36).slice(2,10);

const DEFAULT_PARAMS = {
  ipresRG:{plafond:432000, salarial:0.056, patronal:0.084},
  ipresRC:{plafond:1296000, salarial:0.024, patronal:0.036},
  css:{plafond:63000, allocFamiliale:0.07, accidentTravail:0.03},
  cfce:0.03,
  trimf:[ {max:30000,val:0},{max:50000,val:0},{max:84000,val:300},{max:167000,val:400},{max:584000,val:1000},{max:1000000,val:1500},{max:Infinity,val:3000} ],
  irpp:[ {max:630000,taux:0,ded:0},{max:1500000,taux:0.2,ded:126000},{max:4000000,taux:0.3,ded:276000},{max:8000000,taux:0.35,ded:476000},{max:13500000,taux:0.37,ded:636000},{max:Infinity,taux:0.4,ded:1041000} ],
  abattementTaux:0.3, abattementPlafond:900000,
  quotient:{ 1:{taux:0,min:0,max:0}, 1.5:{taux:0.10,min:100000,max:300000}, 2:{taux:0.15,min:200000,max:650000}, 2.5:{taux:0.20,min:300000,max:1100000}, 3:{taux:0.25,min:400000,max:1650000}, 3.5:{taux:0.30,min:500000,max:2030000}, 4:{taux:0.35,min:600000,max:2490000}, 4.5:{taux:0.40,min:700000,max:2755000}, 5:{taux:0.45,min:800000,max:3180000} }
};

const DEFAULT_ENTREPRISE = { raisonSociale:'', adresse:'', telephone:'', fax:'', ninea:'', convention:'COMMERCE', annee:new Date().getFullYear() };

/* ====================================================================
   MODULE GTA — Gestion des Temps et Absences
   Types d'absence fournis par défaut (modifiables/désactivables, et
   l'administrateur peut en ajouter d'autres). "impacteSolde" = décompté
   du solde de congés payés ; "remunere" = maintien de salaire pendant
   l'absence ; "presenceParticuliere" = ne compte pas comme une absence
   au sens strict (ex: télétravail).
   ==================================================================== */
const DEFAULT_TYPES_ABSENCE = [
  {code:'CA',   libelle:'Congé annuel payé',        impacteSolde:true,  remunere:true,  presenceParticuliere:false, systeme:true},
  {code:'CMAT', libelle:'Congé de maternité',        impacteSolde:false, remunere:true,  presenceParticuliere:false, systeme:true},
  {code:'CPAT', libelle:'Congé de paternité',        impacteSolde:false, remunere:true,  presenceParticuliere:false, systeme:true},
  {code:'CMAR', libelle:'Congé de mariage',          impacteSolde:false, remunere:true,  presenceParticuliere:false, systeme:true},
  {code:'CDEC', libelle:'Congé de décès',            impacteSolde:false, remunere:true,  presenceParticuliere:false, systeme:true},
  {code:'CEXC', libelle:'Congé exceptionnel',        impacteSolde:false, remunere:true,  presenceParticuliere:false, systeme:true},
  {code:'PEXC', libelle:'Permission exceptionnelle', impacteSolde:false, remunere:true,  presenceParticuliere:false, systeme:true},
  {code:'AA',   libelle:'Absence autorisée',         impacteSolde:false, remunere:false, presenceParticuliere:false, systeme:true},
  {code:'ANA',  libelle:'Absence non autorisée',     impacteSolde:false, remunere:false, presenceParticuliere:false, systeme:true},
  {code:'MAL',  libelle:'Arrêt maladie',             impacteSolde:false, remunere:false, presenceParticuliere:false, systeme:true},
  {code:'AT',   libelle:'Accident du travail',       impacteSolde:false, remunere:false, presenceParticuliere:false, systeme:true},
  {code:'FORM', libelle:'Formation',                 impacteSolde:false, remunere:true,  presenceParticuliere:false, systeme:true},
  {code:'MISS', libelle:'Mission',                   impacteSolde:false, remunere:true,  presenceParticuliere:false, systeme:true},
  {code:'MAP',  libelle:'Mise à pied',               impacteSolde:false, remunere:false, presenceParticuliere:false, systeme:true},
  {code:'SUSP', libelle:'Suspension du contrat',     impacteSolde:false, remunere:false, presenceParticuliere:false, systeme:true},
  {code:'TT',   libelle:'Télétravail',                impacteSolde:false, remunere:true,  presenceParticuliere:true,  systeme:true}
];
const DEFAULT_PARAMS_GTA = {
  acquisitionMensuelle: 2.20,          // jours ouvrables acquis par mois de travail effectif
  joursOuvrablesParMois: 26,           // utilisé pour le calcul de l'indemnité de congé
  modeArrondi: 'demi_superieur',       // 'aucun' | 'entier_superieur' | 'entier_inferieur' | 'demi_superieur'
  periodeAcquisition: 'anniversaire',  // 'anniversaire' (date d'entrée) | 'civile' (1er janvier)
  weekendTravaille: false,             // si vrai, samedi/dimanche comptent comme jours ouvrables
  joursFeries: [],                     // liste de dates 'jj/mm/aaaa' (calendrier de l'entreprise)
  majorationAnciennete: [ {anneesMin:15, joursSupp:1}, {anneesMin:20, joursSupp:2}, {anneesMin:25, joursSupp:3} ],
  formuleIndemnite: { diviseur:26 }, // le salaire de référence utilisé est le salaire de base du mois précédent
  methodeCalculConge: 'report_brut', // 'report_brut' (méthode historique) | 'formule_jours' (solde en jours + indemnité = brut × jours/diviseur)
  autoriserSoldeNegatif: false,
  workflowActif: false, // Cloud uniquement : en_attente -> validé_responsable -> validé, avec notification. Classique reste toujours en validation directe.
  typesAbsence: JSON.parse(JSON.stringify(DEFAULT_TYPES_ABSENCE))
};

/* ====================================================================
   GTA ENGINE — moteur de calcul, entièrement pur (aucune lecture ni
   écriture de `state` à l'intérieur de ces fonctions : tout transite par
   les paramètres). Peut être déplacé tel quel vers un service séparé
   (ex: fonction Supabase Edge) sans rien réécrire, le jour où une
   application mobile devra réutiliser exactement les mêmes règles.
   ==================================================================== */
const GTAEngine = (function(){
  function parseFR(d){
    if(!d) return null;
    const parts = String(d).split('/');
    if(parts.length!==3) return null;
    let [j,m,a] = parts.map(x=>parseInt(x,10));
    if(!j||!m||!a) return null;
    if(a<100) a+=2000;
    const dt = new Date(a,m-1,j);
    return isNaN(dt.getTime()) ? null : dt;
  }
  function fmtFR(dt){
    return String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0')+'/'+dt.getFullYear();
  }
  // Nombre de mois pleins travaillés entre deux dates (utilisé pour l'acquisition proratisée)
  function moisTravaillesEntre(dateDebut, dateFin){
    if(!dateDebut || !dateFin || dateFin < dateDebut) return 0;
    let mois = (dateFin.getFullYear()-dateDebut.getFullYear())*12 + (dateFin.getMonth()-dateDebut.getMonth());
    if(dateFin.getDate() < dateDebut.getDate()) mois -= 1;
    return Math.max(0, mois);
  }
  function appliquerArrondi(valeur, mode){
    switch(mode){
      case 'entier_superieur': return Math.ceil(valeur);
      case 'entier_inferieur': return Math.floor(valeur);
      case 'demi_superieur': return Math.ceil(valeur*2)/2;
      case 'aucun': default: return Math.round(valeur*100)/100;
    }
  }
  // Majoration de jours supplémentaires selon un tableau {anneesMin, joursSupp} paramétrable
  function majorationAnciennete(anneesAnciennete, tableau){
    let jours = 0;
    (tableau||[]).forEach(palier=>{ if(anneesAnciennete >= palier.anneesMin) jours = Math.max(jours, palier.joursSupp); });
    return jours;
  }
  // Nombre de jours ouvrables entre deux dates incluses, selon jours fériés et week-end travaillé ou non
  function joursOuvrablesEntre(dateDebut, dateFin, joursFeriesStr, weekendTravaille){
    if(!dateDebut || !dateFin || dateFin < dateDebut) return 0;
    const feries = new Set((joursFeriesStr||[]).map(d=>d)); // comparaison par chaîne jj/mm/aaaa
    let count = 0;
    const cur = new Date(dateDebut);
    while(cur <= dateFin){
      const jourSemaine = cur.getDay(); // 0=dimanche, 6=samedi
      const estWeekend = (jourSemaine===0 || jourSemaine===6);
      const dateStr = fmtFR(cur);
      if((weekendTravaille || !estWeekend) && !feries.has(dateStr)) count++;
      cur.setDate(cur.getDate()+1);
    }
    return count;
  }
  // Acquisition annuelle de congés (jours), proratisée si le salarié n'a pas travaillé toute la période
  function calculAcquisitionAnnuelle(dateEntree, dateSortie, dateRefDebut, dateRefFin, paramsGTA, anneesAnciennete){
    const de = parseFR(dateEntree) || dateRefDebut;
    const ds = dateSortie ? parseFR(dateSortie) : null;
    const debutEffectif = de > dateRefDebut ? de : dateRefDebut;
    const finEffective = (ds && ds < dateRefFin) ? ds : dateRefFin;
    const moisTravailles = moisTravaillesEntre(debutEffectif, finEffective) + 1; // +1 pour inclure le mois en cours
    const base = Math.max(0, Math.min(12, moisTravailles)) * paramsGTA.acquisitionMensuelle;
    const majoration = majorationAnciennete(anneesAnciennete, paramsGTA.majorationAnciennete);
    return appliquerArrondi(base + majoration, paramsGTA.modeArrondi);
  }
  // Solde de congés d'un salarié à une date donnée, à partir de son historique d'absences
  function calculSolde(soldeInitial, acquisitionAnnuelle, absencesDuSalarie, typesAbsence){

const BAREME_IR_MIN=50000, BAREME_IR_MAX=5000000, BAREME_IR_STEP=1000;
let BAREME_IR = null; // chargé de façon asynchrone depuis bareme.json au démarrage


/* ---------- Moteur de calcul (fidèle aux formules du fichier Excel source) ---------- */
/* IR et TRIMF sont lus directement dans le Barème Mensuel des Retenues à la Source (DGID, 2013),
   table officielle couvrant 50 000 F à 5 000 000 F de brut mensuel, par pas de 1 000 F,
   pour les tranches de 1 à 5 parts (pas de 0,5). Au-delà de cette plage (parts hors barème, brut > 5 000 000),
   on retombe sur la formule légale (tranches IRPP + quotient familial), qui coïncide exactement avec le
   barème sur toute sa plage de validité (vérifié point par point). */
function calcTRIMFQuotiteFormule(brut, params){
  for(const seg of params.trimf){ if(brut < seg.max) return seg.val; }
  return params.trimf[params.trimf.length-1].val;
}
function calcIRFormule(brut, nbPartsIR, params){
  const baseAnnuelle = Math.floor(brut/1000)*1000*12;
  const abattement = Math.min(baseAnnuelle*params.abattementTaux, params.abattementPlafond);
  const revenuImposable = Math.max(baseAnnuelle - abattement,0);
  let il = 0;
  for(const tr of params.irpp){
    if(revenuImposable <= tr.max){ il = tr.max===params.irpp[0].max ? 0 : revenuImposable*tr.taux - tr.ded; break; }
  }
  if(il<0) il=0;
  const q = params.quotient[nbPartsIR] || {taux:0,min:0,max:0};
  const ilTaux = (nbPartsIR===1) ? 0 : il*q.taux;
  let reduction = 0;
  if(nbPartsIR!==1){
    if(ilTaux < q.min) reduction = q.min;
    else if(ilTaux < q.max) reduction = ilTaux;
    else if(ilTaux > q.max) reduction = q.max;
    else reduction = 0;
  }
  const irAnnuel = Math.max(il - reduction, 0);
  return irAnnuel/12;
}
function baremeRow(brut){
  if(!BAREME_IR) return null;
  const rounded = Math.floor(brut/1000)*1000;
  if(rounded < BAREME_IR_MIN || rounded > BAREME_IR_MAX) return null;
  return BAREME_IR[(rounded-BAREME_IR_MIN)/BAREME_IR_STEP];
}
let _baremeIRPromise = null;
function ensureBaremeIR(){
  if(BAREME_IR) return Promise.resolve();
  if(_baremeIRPromise) return _baremeIRPromise;
  _baremeIRPromise = fetch('bareme.json')
    .then(res => res.json())
    .then(data => { BAREME_IR = data; })
    .catch(e => { console.error('Impossible de charger bareme.json, utilisation de la formule de secours.', e); });
  return _baremeIRPromise;
}
function calcTRIMFQuotite(brut, params){
  const row = baremeRow(brut);
  if(row) return row[0];
  return calcTRIMFQuotiteFormule(brut, params);
}
function calcIR(brut, nbPartsIR, params){
  const partIdx = Math.round((nbPartsIR-1)*2);
  const isStandardPart = nbPartsIR>=1 && nbPartsIR<=5 && Math.abs(partIdx-(nbPartsIR-1)*2)<1e-9;
  const row = isStandardPart ? baremeRow(brut) : null;
  if(row) return row[1+partIdx];
  return calcIRFormule(brut, nbPartsIR, params);
}
/* Taux d'ancienneté automatique : 2% dès la 2e année révolue après la date d'entrée, +1%/an ensuite.
   dateEntree au format jj/mm/aaaa. moisIdx (0=Janvier..11=Décembre) et annee désignent le mois payé. */
function calcTauxAnciennete(dateEntree, moisIdx, annee){
  if(!dateEntree || typeof dateEntree !== 'string') return 0;
  const parts = dateEntree.split('/');
  if(parts.length!==3) return 0;
  const j = parseInt(parts[0],10), m = parseInt(parts[1],10);
  let a = parseInt(parts[2],10);
  if(!j || !m || !a || j<1 || j>31 || m<1 || m>12) return 0;
  if(a<100) a += 2000; // année saisie sur 2 chiffres (ex: "26") -> 2026, jamais 1926
  if(a<1900 || a>2100) return 0; // garde-fou contre une année aberrante
  const entree = new Date(a, m-1, j);
  if(isNaN(entree.getTime())) return 0;
  const refYear = (typeof annee==='number' && !isNaN(annee)) ? annee : new Date().getFullYear();
  const refMonth = (typeof moisIdx==='number' && !isNaN(moisIdx)) ? moisIdx : 0;
  const refDate = new Date(refYear, refMonth, 1);
  if(isNaN(refDate.getTime()) || refDate < entree) return 0;
  let years = refDate.getFullYear() - entree.getFullYear();
  const anniversaireCetteAnnee = new Date(refDate.getFullYear(), entree.getMonth(), entree.getDate());
  if(refDate < anniversaireCetteAnnee) years -= 1;
  if(years < 2) return 0;
  if(years > 60) years = 60; // garde-fou : au-delà, valeur aberrante plutôt qu'un taux extrême
  return years/100;
}
/* Parts fiscales (quotient familial), utilisées pour l'IR ET la TRIMF (même valeur) :
   1 part célibataire, 1,5 part marié(e), +0,5 part par enfant à charge, plafonné à 5 parts. */
function calcPartsQuotientFamilial(salarie){
  const sit = (salarie.situationFamiliale||'').toLowerCase();
  const estMarie = sit.startsWith('marié') || sit.startsWith('mariée');
  const base = estMarie ? 1.5 : 1;
  const enfants = num(salarie.nbEnfants||0);
  let parts = base + 0.5*enfants;
  if(parts>5) parts=5;
  return Math.round(parts*2)/2; // sécurité : toujours un multiple de 0,5
}
function calcBulletin(salarie, saisie, arrondiPrecedent, params, moisIdx, annee){
  const s = Object.assign(emptySaisie(), saisie||{});
  const tauxAncienneteApplique = calcTauxAnciennete(salarie.dateEntree, moisIdx===undefined?0:moisIdx, annee===undefined?(new Date().getFullYear()):annee);
  const primeAnciennete = num(s.salaireBase) * tauxAncienneteApplique;
  const gains = {
    salaireBase:num(s.salaireBase), sursalaire:num(s.sursalaire), heuresSup:num(s.heuresSup),
    autreGain:num(s.autreGain), primeAnciennete, autresIndemnites:num(s.autresIndemnites),
    logement:num(s.logement), nourriture:num(s.nourriture), congesPayes:num(s.congesPayes), primeExceptionnelle:num(s.primeExceptionnelle)
  };
  const brut = Object.values(gains).reduce((a,b)=>a+b,0);

  const ipresRGRet = Math.min(brut, params.ipresRG.plafond) * params.ipresRG.salarial;
  const ipresRGPat = Math.min(brut, params.ipresRG.plafond) * params.ipresRG.patronal;
  const rcApplicable = (salarie.ipresRC === 'OUI');
  const baseRC = rcApplicable ? brut : 0;
  const ipresRCRet = Math.min(baseRC, params.ipresRC.plafond) * params.ipresRC.salarial;
  const ipresRCPat = Math.min(baseRC, params.ipresRC.plafond) * params.ipresRC.patronal;

  const partsQuotient = calcPartsQuotientFamilial(salarie);
  const nbPartsIR = partsQuotient;
  const ir = calcIR(brut, nbPartsIR, params);
  const trimfQuotite = calcTRIMFQuotite(brut, params);
  const nbPartsTRIMF = partsQuotient;
  const trimf = nbPartsTRIMF * trimfQuotite;

  const cfce = brut * params.cfce;
  const baseCSS = Math.min(brut, params.css.plafond);
  const cssAF = baseCSS * params.css.allocFamiliale;
  const cssAT = baseCSS * params.css.accidentTravail;

  const retenues = {
    ipresRG:Math.round(ipresRGRet), ipresRC:Math.round(ipresRCRet), ir:Math.round(ir), trimf:Math.round(trimf),
    ipm:num(s.retenueIPM), tabaski:num(s.retenueTabaski), prets:num(s.retenuePrets),
    avanceQuinzaine:num(s.retenueAvanceQuinzaine), autreRetenue:num(s.autreRetenue)
  };
  const totalRetenues = Object.values(retenues).reduce((a,b)=>a+b,0);
  const patronales = { ipresRG:Math.round(ipresRGPat), ipresRC:Math.round(ipresRCPat), cfce:Math.round(cfce), cssAF:Math.round(cssAF), cssAT:Math.round(cssAT) };
  const totalPatronal = Object.values(patronales).reduce((a,b)=>a+b,0);

  const net1 = Math.round(brut - totalRetenues);
  const indemnites = { primeTransport:num(s.primeTransport), autres:num(s.autresIndemnitesNonSoumises), arrondiPrecedent:num(arrondiPrecedent||0) };
  const totalIndemnites = Object.values(indemnites).reduce((a,b)=>a+b,0);
  const net2 = net1 + totalIndemnites;
  const netAPayer = Math.floor(net2/100)*100;
  const arrondiDuMois = net2 - netAPayer;

  return { gains, brut, retenues, totalRetenues, patronales, totalPatronal, net1, indemnites, totalIndemnites, net2, netAPayer, arrondiDuMois, coutTotalEmployeur: brut + totalPatronal, tauxAncienneteApplique, partsQuotient };
}
/* Calcule les 12 mois d'un salarié en propageant l'arrondi mois après mois */
function calcAnnee(salarie, saisiesAnnee, params, arrondiInitial, annee){
  let arrondi = num(arrondiInitial||0);
  const res = [];
  for(let m=0;m<12;m++){
    const b = calcBulletin(salarie, saisiesAnnee[m], arrondi, params, m, annee);
    res.push(b);
    arrondi = b.arrondiDuMois;
  }
  return res;
}

async function sha256(s){
  if(!window.crypto || !window.crypto.subtle){
    throw new Error('Votre navigateur bloque les fonctions de sécurité nécessaires sur cette page (souvent car elle n\'est pas chargée en HTTPS). Ouvrez Sunu Paie via son adresse officielle en https://, pas depuis un fichier local.');

  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('').toUpperCase();
}
async function verifyLicenseKey(companyName, key){

async function finalizeActivation(licenseKey, companyName, nom, prenom, check){
  try{
    // Si un profil existe déjà pour ce compte (ex: nouvelle tentative après un souci
    // précédent, ou comportement de Supabase qui réutilise la session sur un e-mail
    // déjà inscrit), pas besoin d'en recréer un : on considère l'activation acquise.
    const { data: existing } = await sb.from('profiles').select('id').eq('id', state.session.user.id).single();
    if(existing) return { success:true, alreadyExisted:true };

    const { data: isFirst, error: rpcError } = await sb.rpc('is_first_activation', { p_license_key: licenseKey });
    if(rpcError) return { success:false, message: 'Erreur de vérification de la licence : '+rpcError.message+' (avez-vous bien exécuté le script SQL le plus récent dans Supabase ?)' };
    const { error } = await sb.from('profiles').insert({
      id: state.session.user.id, email: state.session.user.email, nom, prenom,
      license_key: licenseKey, company_name: companyName, edition: check.edition,
      expires_at: check.expiresAt, is_admin: !!isFirst
    });
    if(error){
      if(error.code === '23505' || /duplicate key/i.test(error.message||'')){
        return { success:true, alreadyExisted:true }; // course avec une tentative precedente : pas grave
      }
      return { success:false, message: 'Erreur lors de la création du profil : '+error.message };
    }
    return { success:true };
  }catch(e){
    return { success:false, message: 'Erreur inattendue : '+(e?.message||e) };
  }
}

async function save(key, value){
  if(!state.companyId) return;
  const blob = { entreprise: state.entreprise, params: state.params, paramsGTA: state.paramsGTA, salaries: state.salaries, saisies: state.saisies, absences: state.absences, absencesHistorique: state.absencesHistorique, arrondisInit: state.arrondisInit, activityLog: state.activityLog };
  state.pendingSaveBlob = blob; // conserve la derniere version en attente, meme si l'enregistrement echoue

  try{
    const { error } = await sb.from('companies').update({ data: blob, updated_at: new Date().toISOString() }).eq('id', state.companyId);

  }catch(e){

async function retryPendingSave(){

  try{

    if(error) throw error;
    state.pendingSaveBlob = null;

const root = document.getElementById('paie-root');
function el(tag, attrs, ...children){
  const e = document.createElement(tag);
  if(attrs) for(const k in attrs){
    if(k==='class') e.className=attrs[k];
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if(k==='html') e.innerHTML = attrs[k];
    else e.setAttribute(k, attrs[k]);
  }
  children.flat().forEach(c=>{ if(c===null||c===undefined) return; if(typeof c==='string'||typeof c==='number') e.appendChild(document.createTextNode(c)); else e.appendChild(c); });
  return e;
}

function monthIndexFromSheetName(name){
  let norm = String(name).toUpperCase();
  norm = norm.replace(/\(.*?\)/g,'').replace(/[ÉÈÊ]/g,'E').replace(/[ÛÙ]/g,'U').trim();
  const map = {JANVIER:0,FEVRIER:1,MARS:2,AVRIL:3,MAI:4,JUIN:5,JUILLET:6,AOUT:7,SEPTEMBRE:8,OCTOBRE:9,NOVEMBRE:10,DECEMBRE:11};
  for(const k in map){ if(norm.startsWith(k)) return map[k]; }
  return null;
}
function yearFromSheetName(name){
  const m = String(name).match(/(20\d{2})/);
  return m ? parseInt(m[1]) : null;
}
function cellVal(ws, r, c){
  const addr = XLSX.utils.encode_cell({r:r-1, c:c-1});
  const cell = ws[addr];
  return cell ? cell.v : null;
}
function findHeaderRow(ws){
  const range = XLSX.utils.decode_range(ws['!ref']||'A1:A1');
  for(let r=range.s.r+1; r<=Math.min(range.e.r+1, 20); r++){
    for(let c=1; c<=3; c++){
      const v = cellVal(ws, r, c);
      if(v && /pr[ée]nom/i.test(String(v))) return r;
    }
  }
  return 3; // repli raisonnable si l'en-tête n'est pas détecté
}
function normalizeHeader(s){
  return String(s||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]+/g,' ').trim();
}
function buildColumnMap(ws, headerRow, maxCol){
  const colTexts = [];
  for(let c=1; c<=maxCol; c++){
    let text = '';
    for(let r=Math.max(1,headerRow-1); r<=headerRow+2; r++){
      const v = cellVal(ws, r, c);
      if(v) text += ' ' + normalizeHeader(v);
    }
    colTexts.push(text.trim());
  }
  const find = (predicate) => {
    for(let i=0;i<colTexts.length;i++){ if(predicate(colTexts[i])) return i+1; }
    return null;
  };
  return {
    nom: find(t => t.includes('prenom') || (t.includes(' nom') || t.startsWith('nom'))),
    fonction: find(t => t.includes('fonction') || t.includes('poste')),
    parts: find(t => t.includes('part')),
    categorie: find(t => t.includes('categorie')),
    salaireBase: find(t => t.includes('salaire') && t.includes('base')),
    sursalaire: find(t => t.includes('sursalaire')),
    congesPayes: find(t => t.includes('conge')),
    indemniteTel: find(t => t.includes('telephone')),
    indemnitePeag: find(t => t.includes('peag')),
    ipm: find(t => /(^| )ipm( |$)/.test(t)),
    ipresRC: find(t => t.includes('ipres') && (t.includes(' rc') || t.includes('rcc') || t.endsWith('rc')) && !t.includes('bi ') && !t.includes('base')),
    colTexts
  };
}
async function importVRSRecapFromXlsx(arrayBuffer, companyName){
  await ensureXLSXLib();
  const wb = XLSX.read(arrayBuffer, {type:'array'});
  const employeesByName = {};
  const saisies = {};
  let annee = null;
  const diagnostic = [];
  wb.SheetNames.forEach(sheetName=>{
    const mi = monthIndexFromSheetName(sheetName);
    if(mi===null){ diagnostic.push(sheetName+' : mois non reconnu (ignorée)'); return; }
    const y = yearFromSheetName(sheetName);
    if(y) annee = y;
    const ws = wb.Sheets[sheetName];
    const range = XLSX.utils.decode_range(ws['!ref']||'A1:A1');
    const headerRow = findHeaderRow(ws);
    const cm = buildColumnMap(ws, headerRow, range.e.c+1);
    // Repli sur la disposition du modèle d'origine si une colonne n'est pas identifiée par son en-tête
    const col = {
      nom: cm.nom || 1, fonction: cm.fonction || 2, parts: cm.parts || 3, categorie: cm.categorie || 4,
      salaireBase: cm.salaireBase || 5, sursalaire: cm.sursalaire || 6, congesPayes: cm.congesPayes || 8,
      indemniteTel: cm.indemniteTel || 10, indemnitePeag: cm.indemnitePeag || 11,
      ipresRC: cm.ipresRC || 16, ipm: cm.ipm || 19
    };
    let found = 0;
    let blancsConsecutifs = 0;
    for(let r = headerRow+1; r <= range.e.r+1; r++){
      const nameVal = cellVal(ws, r, col.nom);
      if(!nameVal || String(nameVal).trim()===''){
        blancsConsecutifs++;
        if(blancsConsecutifs >= 3) break; // 3 lignes vides d'affilée = fin de la liste des salariés
        continue;
      }
      blancsConsecutifs = 0;
      const fullName = String(nameVal).trim();
      if(/^total/i.test(fullName) || /masse\s+salariale/i.test(fullName)) continue; // ligne de total, pas un salarié
      const fonction = cellVal(ws, r, col.fonction) || '';
      const partsRaw = cellVal(ws, r, col.parts);
      const parts = (partsRaw!==undefined && partsRaw!==null && partsRaw!=='') ? Number(partsRaw) : 1;
      const categorie = cellVal(ws, r, col.categorie) || '';
      const salaireBase = Number(cellVal(ws, r, col.salaireBase))||0;
      const sursalaire = Number(cellVal(ws, r, col.sursalaire))||0;
      const congesPayes = Number(cellVal(ws, r, col.congesPayes))||0;
      const indemJ = Number(cellVal(ws, r, col.indemniteTel))||0;
      const indemK = Number(cellVal(ws, r, col.indemnitePeag))||0;
      const ipresRCret = Number(cellVal(ws, r, col.ipresRC))||0;
      const ipm = Number(cellVal(ws, r, col.ipm))||0;

      if(!employeesByName[fullName]){
        const words = fullName.split(' ').filter(Boolean);
        const nom = words.length ? words[words.length-1] : fullName;
        const prenom = words.slice(0,-1).join(' ');
        let situationFamiliale, nbEnfants;
        if(!isFinite(parts) || parts<=1){ situationFamiliale='Célibataire'; nbEnfants=Math.max(0,Math.round(((isFinite(parts)?parts:1)-1)/0.5)); }
        else { situationFamiliale='Marié'; nbEnfants=Math.max(0,Math.round((parts-1.5)/0.5)); }
        employeesByName[fullName] = {
          id: uid(), nom, prenom, dateNaissance:'', lieuNaissance:'', dateEntree:'', dateSortie:'',
          categorie, situationFamiliale, qualification: fonction, sexe:'F', nationalite:'S',
          nbEnfants, ipresRC:'NON', congesAcquis:0
        };
      }
      const emp = employeesByName[fullName];
      if(ipresRCret>0) emp.ipresRC = 'OUI';
      saisies[emp.id+'__'+mi] = Object.assign(emptySaisie(), {
        salaireBase, sursalaire, congesPayes, autresIndemnites: indemJ+indemK, retenueIPM: ipm
      });
      found++;
    }
    const colNames = ['nom','fonction','parts','categorie','salaireBase','sursalaire','congesPayes','indemniteTel','indemnitePeag','ipresRC','ipm'];
    const detected = colNames.map(k => k+'='+(cm[k]?('col.'+XLSX.utils.encode_col(cm[k]-1)):'(repli défaut)')).join(', ');
    diagnostic.push(sheetName+' (mois '+(mi+1)+') : en-tête ligne '+headerRow+', '+found+' salarié(s) lu(s). Colonnes détectées : '+detected);
  });
  const salaries = Object.values(employeesByName);
  const entreprise = Object.assign({}, DEFAULT_ENTREPRISE, {raisonSociale: companyName || 'Entreprise importée', annee: annee || new Date().getFullYear()});
  return { entreprise, params: JSON.parse(JSON.stringify(DEFAULT_PARAMS)), salaries, saisies, arrondisInit:{}, _diagnostic: diagnostic };
}

function parseFRDate(str){
  if(!str || typeof str!=='string') return null;
  const parts = str.split('/');
  if(parts.length!==3) return null;
  const j=parseInt(parts[0],10), mo=parseInt(parts[1],10); let a=parseInt(parts[2],10);
  if(!j||!mo||!a) return null;
  if(a<100) a+=2000;
  const d = new Date(a,mo-1,j);
  return isNaN(d.getTime()) ? null : d;
}
function computeReminders(moisIdx, annee){
  const reminders = [];
  const refStart = new Date(annee, moisIdx, 1);
  const refEnd = new Date(annee, moisIdx+1, 0);
  const soonWindow = new Date(refEnd); soonWindow.setDate(soonWindow.getDate()+15); // + 15 jours après la fin du mois affiché
  state.salaries.forEach(s=>{
    // Fin de période d'essai
    const fpe = parseFRDate(s.finPeriodeEssai);
    if(fpe && fpe >= refStart && fpe <= soonWindow){
      reminders.push({type:'essai', salarie:s, date:s.finPeriodeEssai, texte:'Fin de période d\'essai de '+s.nom+' '+s.prenom+' le '+s.finPeriodeEssai});
    }
    // Echeance CDD
    if((s.typeContrat==='CDD') ){
      const ds = parseFRDate(s.dateSortie);
      if(ds && ds >= refStart && ds <= soonWindow){
        reminders.push({type:'cdd', salarie:s, date:s.dateSortie, texte:'Échéance de CDD de '+s.nom+' '+s.prenom+' le '+s.dateSortie});
      }
    }
    // Anniversaire d'anciennete changeant le taux (dans le mois affiche)
    const de = parseFRDate(s.dateEntree);
    if(de && de.getMonth()===moisIdx){
      const tAvant = calcTauxAnciennete(s.dateEntree, moisIdx-1<0?11:moisIdx-1, moisIdx-1<0?annee-1:annee);
      const tApres = calcTauxAnciennete(s.dateEntree, moisIdx, annee);
      if(tApres !== tAvant){
        reminders.push({type:'anciennete', salarie:s, date:s.dateEntree, texte:'Anniversaire d\'embauche de '+s.nom+' '+s.prenom+' ce mois — taux d\'ancienneté passe à '+(Math.round(tApres*10000)/100)+'%'});
      }
    }
  });
  return reminders;
}

  main.appendChild(el('div',{class:'btn-row no-print', style:'margin-bottom:18px'}, shortcuts));

  main.appendChild(el('div',{class:'kpi-row'},
    kpi(state.salaries.length,'Salariés actifs'),
    kpi(CFA(masseBrute),'Masse salariale brute (cumul)'),
    kpi(CFA(masseNet),'Net à payer (cumul)'),
    kpi(CFA(masseCoutEmployeur),'Coût total employeur (cumul)')
  ));

  if(state.paramsGTA && state.salaries.length){
    const aujourdHui = new Date();
    let joursRestantsTotal = 0; const enCongeAujourdhui = []; const soldesNegatifs = [];
    state.salaries.forEach(s=>{
      const { solde, absencesSalarie } = calculSituationAnnuelle(s);
      joursRestantsTotal += solde.soldeDisponible;
      if(solde.soldeDisponible < 0) soldesNegatifs.push({nom:s.nom+' '+s.prenom, solde:solde.soldeDisponible});
      absencesSalarie.forEach(a=>{
        if(a.statut!=='validé') return;
        const dd = GTAEngine.parseFR(a.dateDebut), df = GTAEngine.parseFR(a.dateFin);
        if(dd && df && aujourdHui>=dd && aujourdHui<=df) enCongeAujourdhui.push(s.nom+' '+s.prenom);
      });
    });
    main.appendChild(el('div',{class:'card', style:'cursor:pointer', onClick:()=>{ state.tab='absences'; state.absencesVue='dashboard'; render(); }},
      el('h3',{},'Congés — vue d\'ensemble'),
      el('div',{class:'kpi-row', style:'margin-top:8px'},
        kpi(Math.round(joursRestantsTotal*100)/100+' j', 'Solde restant (toute l\'entreprise)'),
        kpi(enCongeAujourdhui.length, 'Salarié(s) en congé aujourd\'hui')
      ),
      enCongeAujourdhui.length ? el('div',{class:'help', style:'margin-top:8px'}, 'En congé : '+enCongeAujourdhui.join(', ')) : null
    ));
    if(soldesNegatifs.length){
      main.appendChild(el('div',{class:'card', style:'border-color:var(--red);cursor:pointer', onClick:()=>{ state.tab='absences'; state.absencesVue='rapports'; render(); }},
        el('h3',{style:'color:var(--red)'}, '⚠ '+soldesNegatifs.length+' salarié(s) avec un solde de congés négatif'),
        el('div',{class:'help', style:'margin-top:4px'}, soldesNegatifs.map(x=>x.nom+' ('+x.solde+' j)').join(', ')+' — à régulariser dès que possible (nouvelle acquisition ou correction du solde initial).')
      ));
    }
  }

  const reminders = computeReminders(m, state.entreprise.annee);
  const peutValiderDash = state.paramsGTA && state.paramsGTA.workflowActif && (state.profile.is_admin || can('validations'));
  if(peutValiderDash){
    const enAttenteDash = getAbsencesEnAttenteToutes();
    if(enAttenteDash.length){
      main.appendChild(el('div',{class:'card', style:'border-color:var(--gold);cursor:pointer', onClick:()=>{ state.tab='absences'; state.absencesVue='validations'; render(); }},
        el('h3',{}, '🔔 '+enAttenteDash.length+' congé(s) en attente de votre validation'),
        el('div',{class:'help'}, 'Cliquez ici pour les examiner dans Congés & absences → Validations.')
      ));
    }
  }
  if(reminders.length){
    main.appendChild(el('div',{class:'card', style:'border-color:var(--gold)'}, el('h3',{},'⚠ À ne pas oublier ce mois-ci'),
      el('div',{}, reminders.map(r=> el('div',{style:'padding:7px 0;border-bottom:1px solid var(--paper-dim);font-size:13px'},
        el('span',{class:'badge-warn', style:'margin-right:8px'}, r.type==='essai'?'Essai':r.type==='cdd'?'CDD':'Ancienneté'), r.texte
      )))
    ));
  }

  if(state.salaries.length){
    const chartCard = el('div',{class:'card'}, el('h3',{},'Évolution de la masse salariale — '+state.entreprise.annee));
    const canvas = el('canvas',{width:400,height:220});
    chartCard.appendChild(canvas);
    main.appendChild(chartCard);
    const parMois = Array(12).fill(0);
    state.salaries.forEach(s=>{
      const annee = anneeDeCalcul(s);
      for(let i=0;i<=m;i++){ parMois[i] += annee[i].brut; }
    });
    ensureChartJS().then(()=>{
      if(!canvas.getContext) return;
      new Chart(canvas, {
        type:'bar',
        data:{ labels: MOIS_LABEL.slice(0,m+1).map(x=>x.slice(0,3)), datasets:[{ label:'Masse salariale brute', data: parMois.slice(0,m+1), backgroundColor:'#0E4A3B' }] },
        options:{ plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true, ticks:{ callback:v=>CFA(v) } } } }
      });
    }).catch(e=>{ chartCard.appendChild(el('div',{class:'help'}, e.message)); });
  }

  const card = el('div',{class:'card'}, el('h3',{},'Salaires du mois — '+MOIS_LABEL[m]));
  if(!state.salaries.length){
    card.appendChild(el('div',{class:'empty'}, el('h3',{},'Aucun salarié'), el('div',{},'Ajoutez vos salariés dans l\'onglet « Salariés » pour commencer.')));
  } else {
    const tbl = el('table',{},
      el('thead',{}, el('tr',{}, el('th',{},'Salarié'), el('th',{},'Poste'), th_num('Brut'), th_num('Retenues'), th_num('Net à payer'))),

      }))
    );
    card.appendChild(tbl);
  }
  main.appendChild(card);
}

function buildJournalLignes(t, libelleMois){
  const r2 = n => Math.round(n||0);
  const lignes = [
    { compte:661100, libelle:'Salaires bruts du personnel — '+libelleMois, debit:r2(t.brut), credit:0 },
    { compte:663000, libelle:'Primes et indemnités non soumises (transport, autres) — '+libelleMois, debit:r2(t.primesNonSoumises), credit:0 },
    { compte:664100, libelle:'IPRES RG — charges patronales — '+libelleMois, debit:r2(t.ipresRGpat), credit:0 },
    { compte:664110, libelle:'IPRES RC — charges patronales — '+libelleMois, debit:r2(t.ipresRCpat), credit:0 },
    { compte:664120, libelle:'CSS — allocations familiales + accident du travail — '+libelleMois, debit:r2(t.cssAF+t.cssAT), credit:0 },
    { compte:641300, libelle:'CFCE — '+libelleMois, debit:r2(t.cfce), credit:0 },
    { compte:664130, libelle:'IPM — participation employeur — '+libelleMois, debit:r2(t.ipm), credit:0 },
    { compte:431300, libelle:'IPRES à payer (RG + RC) — '+libelleMois, debit:0, credit:r2(t.ipresRG+t.ipresRC+t.ipresRGpat+t.ipresRCpat) },
    { compte:447100, libelle:'IR à reverser — '+libelleMois, debit:0, credit:r2(t.ir) },
    { compte:447200, libelle:'TRIMF à reverser — '+libelleMois, debit:0, credit:r2(t.trimf) },
    { compte:447300, libelle:'CFCE à reverser — '+libelleMois, debit:0, credit:r2(t.cfce) },
    { compte:431100, libelle:'CSS — allocations familiales à payer — '+libelleMois, debit:0, credit:r2(t.cssAF) },
    { compte:431200, libelle:'CSS — accident du travail à payer — '+libelleMois, debit:0, credit:r2(t.cssAT) },
    { compte:433100, libelle:'IPM à payer — '+libelleMois, debit:0, credit:r2(t.ipm*2) },
    { compte:428900, libelle:'Autres retenues sur salaires (avances, prêts, Tabaski...) — '+libelleMois, debit:0, credit:r2(t.autresRetenues) },
    { compte:422000, libelle:'Rémunérations dues au personnel (net à payer) — '+libelleMois, debit:0, credit:r2(t.net) },
  ].filter(l => l.debit!==0 || l.credit!==0);
  let totalDebit = lignes.reduce((a,l)=>a+l.debit,0);
  let totalCredit = lignes.reduce((a,l)=>a+l.credit,0);
  const ecart = totalCredit - totalDebit;
  const seuilAnormal = Math.max(1000, totalCredit*0.005);
  if(ecart !== 0 && Math.abs(ecart) <= seuilAnormal){
    if(ecart > 0){ lignes.push({compte:658000, libelle:'Écart d\'arrondi — '+libelleMois, debit:ecart, credit:0}); totalDebit += ecart; }
    else { lignes.push({compte:758000, libelle:'Écart d\'arrondi — '+libelleMois, debit:0, credit:-ecart}); totalCredit += -ecart; }
  }
  return {lignes, totalDebit, totalCredit};
}

    [],
    ['Compte','Libellé','Débit','Crédit'],
    ...lignes.map(l=>[l.compte, l.libelle, l.debit||'', l.credit||'']),
    [],
    ['','Total', totalDebit, totalCredit]
  ];
  const ws = XLSX.utils.aoa_to_sheet(rows);

    alert('Attention : ce journal ne s\'équilibre pas (écart de '+Math.round(Math.abs(totalDebit-totalCredit))+' F, largement supérieur à un simple arrondi). Vérifiez les saisies du mois (retenues ou indemnités inhabituelles).');
  }
}
async function exportEcrituresComptablesAnnuel(totauxMois, annee){
  try{ await ensureXLSXLib(); } catch(e){ alert(e.message); return; }
  const wb = XLSX.utils.book_new();
  let anomalies = [];
  totauxMois.forEach((t,m)=>{
    const libelleMois = MOIS_LABEL[m] + ' ' + (annee||'');
    const {lignes, totalDebit, totalCredit} = buildJournalLignes(t, libelleMois);
    if(!lignes.length) return; // mois sans aucune donnée saisie -> onglet ignoré
    const rows = [
      ['JOURNALISATION SALAIRE — '+libelleMois],
      [],
      ['Compte','Libellé','Débit','Crédit'],
      ...lignes.map(l=>[l.compte, l.libelle, l.debit||'', l.credit||'']),
      [],
      ['','Total', totalDebit, totalCredit]
    ];
    if(Math.abs(totalDebit-totalCredit) > 1) anomalies.push(MOIS_LABEL[m]);
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:10},{wch:55},{wch:14},{wch:14}];
    XLSX.utils.book_append_sheet(wb, ws, MOIS_LABEL[m].slice(0,28));
  });
  if(!wb.SheetNames.length){ alert('Aucune donnée de paie saisie sur l\'année — rien à générer.'); return; }
  XLSX.writeFile(wb, 'Journal_paie_annuel_'+(annee||'')+'.xlsx');
  if(anomalies.length){
    alert('Attention : les mois suivants ne s\'équilibrent pas parfaitement : '+anomalies.join(', ')+'. Vérifiez les saisies correspondantes.');
  }
}

async function importSalariesFromXlsx(arrayBuffer){
  await ensureXLSXLib();
  const wb = XLSX.read(arrayBuffer, {type:'array', cellDates:true});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:false, dateNF:'dd/mm/yyyy', defval:''});
  let created=0, updated=0;
  rows.slice(1).forEach(cols=>{
    if(!cols || (!cols[1] && !cols[2])) return; // pas de nom/prenom -> ligne ignorée
    const ordre = parseInt(cols[0]);
    const nom = String(cols[1]||'').trim(), prenom = String(cols[2]||'').trim();
    let existing = null;
    if(ordre && state.salaries.find(s=>s.id==='s'+ordre)) existing = state.salaries.find(s=>s.id==='s'+ordre);
    if(!existing) existing = state.salaries.find(s=> s.nom.toLowerCase()===nom.toLowerCase() && s.prenom.toLowerCase()===prenom.toLowerCase());
    const data = {
      nom, prenom,
      dateNaissance: String(cols[3]||''), lieuNaissance: String(cols[4]||''), dateEntree: String(cols[5]||''), dateSortie: String(cols[6]||''),
      categorie: String(cols[7]||''), situationFamiliale: String(cols[8]||'')||'Célibataire', qualification: String(cols[9]||''),
      sexe: String(cols[10]||'')||'F', nationalite: String(cols[11]||'')||'S',
      nbEnfants: cols[12]!==undefined && cols[12]!=='' ? parseFloat(cols[12]) : 0,
      ipresRC: String(cols[13]||'NON').toUpperCase().indexOf('OUI')===0 ? 'OUI':'NON',
      congesAcquis: cols[14]!==undefined && cols[14]!=='' ? parseFloat(cols[14]) : 0,
    };
    if(existing){ Object.assign(existing, data); updated++; }
    else { state.salaries.push(Object.assign({id: ordre? 's'+ordre : uid()}, data)); created++; }
  });
  save('salaries', state.salaries);
  return {created, updated};
}

function deleteSalarie(id){

  render();

/* ---- Saisie & bulletin ---- */
function computeArrondiPrecedent(salarie, moisIdx){
  if(moisIdx===0) return state.arrondisInit[salarie.id]||0;
  let arrondi = state.arrondisInit[salarie.id]||0;
  for(let m=0;m<moisIdx;m++){ const b = calcBulletin(salarie, getSaisie(salarie.id,m), arrondi, state.params, m, state.entreprise.annee); arrondi = b.arrondiDuMois; }
  return arrondi;
}
/* ---- Congés & absences (module GTA) ---- */
function getAbsencesSalarie(salId){ return state.absences[salId] || []; }
function setAbsencesSalarie(salId, list){ state.absences[salId] = list; save('absences', state.absences); }
function anneesAncienneteA(salarie, dateRef){
  const de = GTAEngine.parseFR(salarie.dateEntree);
  if(!de) return 0;
  let annees = dateRef.getFullYear() - de.getFullYear();
  if((dateRef.getMonth() < de.getMonth()) || (dateRef.getMonth()===de.getMonth() && dateRef.getDate()<de.getDate())) annees--;
  return Math.max(0, annees);
}
function emptyAbsence(){ return { id:uid(), typeCode: (state.paramsGTA.typesAbsence[0]||{}).code||'CA', dateDebut:'', dateFin:'', nbJours:0, calculAuto:true, motif:'', observations:'', statut:'validé', dateCreation:new Date().toISOString() }; }
function logAbsenceHistorique(salarie, action, ancienneValeur, nouvelleValeur, motif){
  state.absencesHistorique.unshift({

  });

  save('absencesHistorique', state.absencesHistorique);

function calculSituationAnnuelle(salarie){
  const paramsGTA = state.paramsGTA;
  const annee = state.entreprise.annee || new Date().getFullYear();
  const refDebut = new Date(annee, 0, 1), refFin = new Date(annee, 11, 31);
  const anneesAnc = anneesAncienneteA(salarie, refFin);
  const acquisitionAnnuelle = GTAEngine.calculAcquisitionAnnuelle(salarie.dateEntree, salarie.dateSortie, refDebut, refFin, paramsGTA, anneesAnc);
  const absencesSalarie = getAbsencesSalarie(salarie.id);
  const soldeInitial = salarie.gtaSoldeInitial || 0;
  const solde = GTAEngine.calculSolde(soldeInitial, acquisitionAnnuelle, absencesSalarie, paramsGTA.typesAbsence);
  return { anneesAnc, acquisitionAnnuelle, absencesSalarie, solde };
}
function renderAbsencesDashboard(main){
  const paramsGTA = state.paramsGTA;
  const annee = state.entreprise.annee || new Date().getFullYear();
  const aujourdHui = new Date();
  let nbAbsentsAujourdhui = 0, nbEnConge = 0, congesRestants = 0, congesConsommes = 0;
  const parType = {}; paramsGTA.typesAbsence.forEach(t=> parType[t.code] = 0);
  const parMois = Array(12).fill(0);
  const typesImpactants = new Set(paramsGTA.typesAbsence.filter(t=>t.impacteSolde).map(t=>t.code));

  state.salaries.forEach(s=>{
    const { solde, absencesSalarie } = calculSituationAnnuelle(s);
    congesRestants += solde.soldeDisponible;
    congesConsommes += solde.joursPris;
    let estAbsentAujourdhui = false;
    absencesSalarie.forEach(a=>{
      if(a.statut==='annulé') return;
      parType[a.typeCode] = (parType[a.typeCode]||0) + (Number(a.nbJours)||0);
      const dd = GTAEngine.parseFR(a.dateDebut), df = GTAEngine.parseFR(a.dateFin);
      if(dd && dd.getFullYear()===annee) parMois[dd.getMonth()] += Number(a.nbJours)||0;
      if(dd && df && aujourdHui>=dd && aujourdHui<=df) estAbsentAujourdhui = true;
      if(dd && df && aujourdHui>=dd && aujourdHui<=df && typesImpactants.has(a.typeCode)) nbEnConge++;
    });
    if(estAbsentAujourdhui) nbAbsentsAujourdhui++;
  });
  const joursOuvrablesTheoriques = state.salaries.length * paramsGTA.joursOuvrablesParMois * 12;
  const tauxAbsence = joursOuvrablesTheoriques>0 ? Math.round((congesConsommes/joursOuvrablesTheoriques)*10000)/100 : 0;

  main.appendChild(el('div',{class:'kpi-row'},
    kpi(nbAbsentsAujourdhui, 'Salariés absents aujourd\'hui'),
    kpi(nbEnConge, 'Salariés en congé aujourd\'hui'),
    kpi(Math.round(congesRestants*100)/100+' j', 'Congés restants (entreprise)'),
    kpi(Math.round(congesConsommes*100)/100+' j', 'Congés consommés '+annee)

  main.appendChild(chartsRow);

  ensureChartJS().then(()=>{
    const labels = Object.keys(parType).filter(k=>parType[k]>0);
    if(labels.length && canvasPie.getContext){
      new Chart(canvasPie, { type:'doughnut', data:{ labels: labels.map(c=>(paramsGTA.typesAbsence.find(t=>t.code===c)||{}).libelle||c), datasets:[{ data: labels.map(c=>parType[c]), backgroundColor:['#0E4A3B','#9C7530','#8FBFA6','#C0492F','#5B6660','#E9D9B6','#0A3428','#B5883A','#D8CFB8','#6B8F7F','#A23B2E','#7A9B87'] }] }, options:{ plugins:{ legend:{ position:'bottom', labels:{ font:{size:11} } } } } });
    }
    if(canvasBar.getContext){
      new Chart(canvasBar, { type:'bar', data:{ labels: MOIS_LABEL.map(m=>m.slice(0,3)), datasets:[{ label:'Jours d\'absence', data: parMois, backgroundColor:'#0E4A3B' }] }, options:{ plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true } } } });

/* Applique un mois de congé à la saisie d'un salarié, selon la méthode choisie dans les
   paramètres (report du brut précédent, ou formule par jours). Utilisée à la fois par le
   bouton de Saisie & bulletin et par le lien direct depuis Congés & absences. */
function appliquerCongeAuMois(salarie, moisIdx, joursOverride){
  if(moisIdx<=0){ alert('Impossible d\'appliquer un congé au premier mois de l\'année (aucun mois précédent de référence).'); return false; }
  const methode = state.paramsGTA.methodeCalculConge || 'report_brut';
  const arrondiPrecPourMoisPrecedent = computeArrondiPrecedent(salarie, moisIdx-1);
  const bMoisPrecedent = calcBulletin(salarie, getSaisie(salarie.id,moisIdx-1), arrondiPrecPourMoisPrecedent, state.params, moisIdx-1, state.entreprise.annee);

  if(methode === 'report_brut'){
    if(!confirm('Marquer '+MOIS_LABEL[moisIdx]+' comme mois de congé pour '+salarie.nom+' '+salarie.prenom+' ?\n\nLes gains habituels (salaire de base, sursalaire...) seront mis à 0, et le brut de '+MOIS_LABEL[moisIdx-1]+' ('+CFA(bMoisPrecedent.brut)+') sera reporté en « Congés payés ». Les retenues et cotisations se recalculeront automatiquement sur cette base.')) return false;
    const nouvelleSaisie = Object.assign(emptySaisie(), getSaisie(salarie.id,moisIdx));
    nouvelleSaisie.salaireBase = 0; nouvelleSaisie.sursalaire = 0; nouvelleSaisie.heuresSup = 0; nouvelleSaisie.autreGain = 0;
    nouvelleSaisie.autresIndemnites = 0; nouvelleSaisie.logement = 0; nouvelleSaisie.nourriture = 0; nouvelleSaisie.primeExceptionnelle = 0;
    nouvelleSaisie.congesPayes = Math.round(bMoisPrecedent.brut);
    setSaisie(salarie.id, moisIdx, nouvelleSaisie);
    logActivity('Mois de congé activé pour '+salarie.nom+' '+salarie.prenom+' ('+MOIS_LABEL[moisIdx]+') — brut reporté : '+CFA(bMoisPrecedent.brut));
    render();
    return true;
  }

  // Méthode 'formule_jours' — cahier des charges "Bulletin de Congé"
  let jours = joursOverride;
  if(jours==null){
    const sit = calculSituationCongesMois(salarie, moisIdx, state.entreprise.annee);
    jours = sit.joursPris;
  }
  if(!jours || jours<=0){
    alert('Aucun jour de congé n\'est déclaré pour '+MOIS_LABEL[moisIdx]+' dans l\'onglet Congés & absences. Déclarez d\'abord l\'absence (type « Congé annuel payé »), puis réessayez.');
    return false;
  }
  const sit = calculSituationCongesMois(salarie, moisIdx, state.entreprise.annee);
  const totalDisponible = Math.round((sit.soldePrecedent + sit.acquisitionDuMois)*100)/100;
  if(totalDisponible < jours && !state.paramsGTA.autoriserSoldeNegatif){
    if(!confirm('Attention : le solde disponible ('+totalDisponible+' j) est inférieur aux jours demandés ('+jours+' j). Le paramètre « autoriser un solde négatif » n\'est pas activé.\n\nContinuer quand même ?')) return false;
  }
  const salaireReference = bMoisPrecedent.gains.salaireBase || 0;
  const diviseur = state.paramsGTA.formuleIndemnite.diviseur || 26;
  const indemnite = GTAEngine.calculIndemniteConge(salaireReference, jours, state.paramsGTA.formuleIndemnite);
  const detail = 'Salaire de référence : '+CFA(salaireReference)+'\nJours indemnisés : '+jours+' j\nDiviseur : '+diviseur+'\n\nIndemnité = '+CFA(salaireReference)+' × ('+jours+' ÷ '+diviseur+') = '+CFA(indemnite);
  if(!confirm('Appliquer le congé de '+MOIS_LABEL[moisIdx]+' pour '+salarie.nom+' '+salarie.prenom+' ?\n\n'+detail)) return false;
  const nouvelleSaisie = Object.assign(emptySaisie(), getSaisie(salarie.id,moisIdx));
  nouvelleSaisie.salaireBase = 0; nouvelleSaisie.sursalaire = 0; nouvelleSaisie.heuresSup = 0; nouvelleSaisie.autreGain = 0;
  nouvelleSaisie.autresIndemnites = 0; nouvelleSaisie.logement = 0; nouvelleSaisie.nourriture = 0; nouvelleSaisie.primeExceptionnelle = 0;
  nouvelleSaisie.congesPayes = indemnite;
  setSaisie(salarie.id, moisIdx, nouvelleSaisie);
  logActivity('Congé (formule par jours) appliqué pour '+salarie.nom+' '+salarie.prenom+' ('+MOIS_LABEL[moisIdx]+') — '+jours+' j, indemnité '+CFA(indemnite));
  render();
  return true;
}
function calculSituationCongesMois(salarie, moisIdx, annee){
  const paramsGTA = state.paramsGTA;
  const absences = getAbsencesSalarie(salarie.id);
  const typesImpactants = new Set(paramsGTA.typesAbsence.filter(t=>t.impacteSolde).map(t=>t.code));
  let joursPrisMois = 0, joursPrisAvant = 0;
  absences.forEach(a=>{
    if(!typesImpactants.has(a.typeCode) || a.statut==='annulé' || a.statut==='refusé' || a.statut==='en_attente' || a.statut==='validé_responsable') return;
    const dd = GTAEngine.parseFR(a.dateDebut);
    if(!dd) return;
    if(dd.getFullYear()===annee && dd.getMonth()===moisIdx) joursPrisMois += Number(a.nbJours)||0;
    else if(dd.getFullYear()<annee || (dd.getFullYear()===annee && dd.getMonth()<moisIdx)) joursPrisAvant += Number(a.nbJours)||0;
  });
  const refDebut = new Date(annee,0,1);
  const finMoisPrecedent = new Date(annee, moisIdx, 0);
  const anc = anneesAncienneteA(salarie, finMoisPrecedent);
  const acquisAvant = moisIdx===0 ? 0 : GTAEngine.calculAcquisitionAnnuelle(salarie.dateEntree, salarie.dateSortie, refDebut, finMoisPrecedent, paramsGTA, anc);
  const soldePrecedent = Math.round(((salarie.gtaSoldeInitial||0) + acquisAvant - joursPrisAvant)*100)/100;
  const acquisitionDuMois = paramsGTA.acquisitionMensuelle;
  const soldeRestant = Math.round((soldePrecedent + acquisitionDuMois - joursPrisMois)*100)/100;
  return { soldePrecedent, acquisitionDuMois, joursPris: joursPrisMois, soldeRestant };
}

function h3WithExport(titre, getRows){
  const btn = el('button',{class:'btn secondary no-print', style:'padding:5px 10px;font-size:11.5px;margin-left:10px', onClick: async ()=>{
    try{ await ensureXLSXLib(); } catch(e){ alert(e.message); return; }
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(getRows());
    XLSX.utils.book_append_sheet(wb, ws, 'Tableau');
    XLSX.writeFile(wb, titre.replace(/[^a-z0-9]+/gi,'_').slice(0,50)+'.xlsx');
  }}, '⇩ Excel');
  return el('h3',{style:'display:flex;align-items:center'}, titre, btn);
}

  main.appendChild(irppCard);

  main.appendChild(el('div',{class:'card'}, el('h3',{},'Quotient familial (réduction d\'impôt, utilisé par le calcul de secours)'),
    el('table',{}, el('thead',{}, el('tr',{}, el('th',{},'Nombre de parts'), el('th',{},'Taux'), el('th',{},'Réduction min'), el('th',{},'Réduction max'))),
      el('tbody',{}, Object.entries(p.quotient).filter(([k])=>k!=='1').map(([k,v])=> el('tr',{}, el('td',{}, k), el('td',{}, (v.taux*100)+'%'), el('td',{}, CFA(v.min)), el('td',{}, CFA(v.max))))))
  ));
}

/* ---- Installation PWA (bouton "Installer l'application") ---- */
let deferredInstallPrompt = null;
let appIsInstalled = false;
function isRunningStandalone(){
  return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true;
}
function isIOSDevice(){
  return /iPad|iPhone|iPod/.test(window.navigator.userAgent) && !window.MSStream;
}
if(isRunningStandalone()) appIsInstalled = true;
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredInstallPrompt = e;
  render();
});
window.addEventListener('appinstalled', ()=>{
  deferredInstallPrompt = null;
  appIsInstalled = true;
  render();
});
function canOfferInstall(){
  return !appIsInstalled && (!!deferredInstallPrompt || isIOSDevice());
}
function openInstallModal(){
  if(deferredInstallPrompt){
    deferredInstallPrompt.prompt();
    deferredInstallPrompt.userChoice.then(()=>{ deferredInstallPrompt = null; render(); });
    return;
  }
  // iOS Safari (et navigateurs sans beforeinstallprompt) : instructions manuelles
  state.modal = () => {
    const overlay = el('div',{class:'modal-overlay no-print', onClick:(e)=>{ if(e.target===overlay){ state.modal=null; render(); } }});
    const modal = el('div',{class:'modal no-print', style:'max-width:420px'},
      el('h2',{},'Installer Sunu Paie'),
      el('div',{class:'help', style:'margin-bottom:10px'}, isIOSDevice()
        ? 'Sur iPhone/iPad (Safari) :'
        : 'Selon votre navigateur, l\'installation automatique n\'est pas proposée ici. Essayez :'),
      el('ol',{style:'padding-left:20px;font-size:13.5px;line-height:1.8;color:var(--ink)'},
        isIOSDevice()
        ? [el('li',{},'Touchez l\'icône de partage ', el('b',{},'⬆️'),' en bas de l\'écran'),
           el('li',{},'Faites défiler et touchez ', el('b',{},'« Sur l\'écran d\'accueil »')),
           el('li',{},'Touchez ', el('b',{},'« Ajouter »'),' en haut à droite')]
        : [el('li',{},'Ouvrez le menu ⋮ de votre navigateur'),
           el('li',{},'Cherchez ', el('b',{},'« Installer l\'application »'),' ou ', el('b',{},'« Ajouter à l\'écran d\'accueil »'))]
      ),
      el('div',{class:'btn-row', style:'margin-top:16px'}, el('button',{class:'btn secondary', style:'width:100%', onClick:()=>{ state.modal=null; render(); }}, 'Fermer'))
    );
    overlay.appendChild(modal);
    return overlay;
  };
  render();
}
function installButton(){
  if(!canOfferInstall()) return null;
  return el('button',{class:'nav-btn', style:'background:rgba(181,136,58,.18);color:var(--gold-soft)', onClick:openInstallModal}, el('span',{class:'nav-num'},'⇩'), 'Installer l\'application');
}

ensureBaremeIR();
loadAll();
})();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
